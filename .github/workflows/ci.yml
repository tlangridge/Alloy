name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.8", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit tests (mock panelists, no tokens)
        run: python3 -m unittest discover -s tests -v
      - name: Validate SKILL.md
        run: python3 tests/validate_skill.py
      - name: Smoke test doctor/version/estimate
        run: |
          python3 bin/fusion version
          python3 bin/fusion doctor
          python3 bin/fusion estimate --rounds 3

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh
